<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Брейн-рінг: Історія України</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0057b7, #ffd700);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quiz {
            width: 960px;
            background: white;
            border: 8px solid #0057b7;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }
        .timer {
            float: right;
            font-size: 40px;
            font-weight: bold;
            color: #0057b7;
            background: #ffd700;
            padding: 10px 20px;
            border-radius: 60px;
            border: 3px solid #0057b7;
        }
        h2 {
            text-align: center;
            color: #0057b7;
            margin: 25px 0;
            font-size: 28px;
            text-shadow: 2px 2px 0 #ffd700;
        }
        .image-wrapper {
            height: 380px;
            border: 4px solid #ffd700;
            border-radius: 20px;
            overflow: hidden;
            background: #f8f8f8;
            margin: 20px 0;
            box-shadow: inset 0 0 10px #aaa;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .answers button {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            font-size: 18px;
            border: 2px solid #0057b7;
            background: #f0f8ff;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .answers button:hover {
            background: #d0e8ff;
            transform: scale(1.02);
        }
        .answers button.correct {
            background: #4CAF50;
            color: white;
            border-color: #2e7d32;
        }
        .answers button.wrong {
            background: #f44336;
            color: white;
            border-color: #b71c1c;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .controls button {
            flex: 1;
            padding: 16px;
            font-size: 18px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .skip-btn {
            background: #ffd700;
            color: #0057b7;
            border: 2px solid #0057b7;
        }
        .end-btn {
            background: #ff6347;
            color: white;
            border: 2px solid #b71c1c;
        }
        .controls button:hover {
            filter: brightness(0.9);
            transform: scale(1.02);
        }
        .name-input {
            text-align: center;
            margin: 50px 0;
            background: #f0f8ff;
            padding: 40px;
            border-radius: 60px;
            border: 4px solid #ffd700;
        }
        .name-input h2 {
            margin-top: 0;
        }
        .name-input input {
            padding: 16px;
            font-size: 20px;
            width: 300px;
            border: 3px solid #0057b7;
            border-radius: 60px;
            text-align: center;
        }
        .name-input button {
            padding: 16px 40px;
            background: #ffd700;
            color: #0057b7;
            border: 3px solid #0057b7;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            margin-left: 15px;
            cursor: pointer;
        }
        .final {
            display: none;
            text-align: center;
            padding: 40px;
            background: linear-gradient(145deg, #fff, #f5f5f5);
            border: 6px solid #ffd700;
            border-radius: 80px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .final h2 {
            font-size: 48px;
            margin-bottom: 40px;
            color: #0057b7;
            text-shadow: 4px 4px 0 #ffd700;
        }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            margin: 40px 0;
        }
        .place {
            background: white;
            border-radius: 60px 60px 20px 20px;
            padding: 30px 20px;
            width: 220px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            border: 4px solid #0057b7;
        }
        .place.first {
            background: gold;
            transform: scale(1.1);
            border-color: #b8860b;
        }
        .place.second {
            background: silver;
            border-color: #5a5a5a;
        }
        .place.third {
            background: #cd7f32; /* bronze */
            border-color: #8b4513;
        }
        .place .medal {
            font-size: 70px;
            margin-bottom: 10px;
        }
        .place .team-name {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
        }
        .place .stats {
            font-size: 20px;
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 40px;
        }
        .final p {
            font-size: 24px;
            margin: 10px;
        }
        #overallFinal {
            display: none;
        }
    </style>
</head>
<body>
<div class="quiz">
    <!-- Команда 1 -->
    <div id="team1NameInput" class="name-input">

        { q: "Коли за наказом російської імператриці Катерини ІІ було знищено останню Січ на Запорожжі?", a: ["1775", "1648", "1701", "1861"], correct: 0, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4ZV5KHQ081s8kPH1suCMRmjFE7AC9aspyeA&s" },
        { q: "Хто був останнім гетьманом?", a: ["Данило Апостол", "Іван Скоропадський", "Кирило Розумовський", "Іван Мазепа"], correct: 2, image: "https://3.lic.zhitomir.ua/wp-content/uploads/2023/03/r0.jpg" },
        { q: "Кого з гетьманів вважають автором першої Конституції України?", a: ["Богдана Хмельницького", "Петра Конашевича-Сагайдачного", "Івана Мазепу", "Пилипа Орлика"], correct: 3, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTfcviDv4MU-w0k5FXycX-1TDJYmT63uYyF2w&s" },
        { q: "Яка з указаних ознак є головною у визначенні поняття «кріпацтво»?", a: ["щоденний відробіток панщини", "особиста залежність селянина від пана", "сплата оброку", "виконання повинностей"], correct: 1, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmSRX2-by_BxvnzfsE9FXxdooBpjWYPRhnmw&s" },
        { q: "Як називається найвідоміша збірка зображеного діяча української культури?", a: ["«Енеїда»", "«Кобзар»", "«Лісова пісня»", "«Заповіт»"], correct: 1, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Taras_Shevchenko_-_portrait_by_Ivan_Kramskoi.jpg/500px-Taras_Shevchenko_-_portrait_by_Ivan_Kramskoi.jpg" },
        { q: "Хто є автором картини, зображеної на репродукції?", a: ["В. Боровиковський", "М. Пимоненко", "Т. Шевченко", "І. Рєпін"], correct: 3, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR88SGdJr72qwMoWi9LNYw-Z0mKvGwWZpMDjw&s" }
    ];

    // -------------------- Глобальні змінні --------------------
    let teamQuestions = [[], [], []];         // по 13 випадкових питань для кожної команди
    let teamNames = ["", "", ""];
    let scores = [0, 0, 0];
    let indices = [0, 0, 0];
    let startTimes = [null, null, null];      // час старту раунду (timestamp)
    let elapsedSeconds = [0, 0, 0];            // накопичені секунди (фіксуємо після завершення)
    let timers = [null, null, null];
    let currentTeam = 1;

    // -------------------- Перемішування і розподіл питань --------------------
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Роздати кожній команді по 13 випадкових унікальних питань
    const shuffled = shuffleArray([...questions]);
    teamQuestions[0] = shuffled.slice(0, 13);
    teamQuestions[1] = shuffled.slice(13, 26);
    teamQuestions[2] = shuffled.slice(26, 39);

    // -------------------- Допоміжні функції --------------------
    function formatTime(sec) {
        let m = Math.floor(sec / 60);
        let s = sec % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function loadQuestion() {
        const list = teamQuestions[currentTeam - 1];
        const i = indices[currentTeam - 1];
        document.getElementById(`question${currentTeam}`).textContent = list[i].q;
        document.getElementById(`image${currentTeam}`).src = list[i].image || 'https://via.placeholder.com/800x400?text=Немає+зображення';
        const div = document.getElementById(`answers${currentTeam}`);
        div.innerHTML = "";
        list[i].a.forEach((text, k) => {
            const btn = document.createElement("button");
            btn.textContent = text;
            btn.onclick = () => checkAnswer(k);
            div.appendChild(btn);
        });
    }

    function checkAnswer(k) {
        const list = teamQuestions[currentTeam - 1];
        const i = indices[currentTeam - 1];
        if (k === list[i].correct) scores[currentTeam - 1]++;

        const btns = document.getElementById(`answers${currentTeam}`).children;
        for (let j = 0; j < btns.length; j++) {
            btns[j].disabled = true;
            if (j === list[i].correct) btns[j].classList.add("correct");
            else if (j === k) btns[j].classList.add("wrong");
        }

        setTimeout(() => {
            indices[currentTeam - 1]++;
            if (indices[currentTeam - 1] < list.length) {
                loadQuestion();
            } else {
                finishTeam(currentTeam);
            }
        }, 3000);
    }

    function skip(team) {
        indices[team - 1]++;
        if (indices[team - 1] < teamQuestions[team - 1].length) {
            loadQuestion();
        } else {
            finishTeam(team);
        }
    }

    function startTeam(team) {
        // Зберігаємо назву команди
        teamNames[team - 1] = document.getElementById(`team${team}Name`).value.trim() || `Команда ${team}`;

        // Ховаємо введення назви, показуємо гру
        document.getElementById(`team${team}NameInput`).style.display = "none";
        document.getElementById(`team${team}`).style.display = "block";
        currentTeam = team;

        // Скидаємо лічильники для цієї команди (якщо раунд не дограний)
        indices[team - 1] = 0;
        scores[team - 1] = 0;
        elapsedSeconds[team - 1] = 0;
        startTimes[team - 1] = Date.now();

        // Завантажуємо перше питання
        loadQuestion();

        // Запускаємо секундомір (оновлення щосекунди)
        if (timers[team - 1]) clearInterval(timers[team - 1]);
        timers[team - 1] = setInterval(() => {
            if (startTimes[team - 1]) {
                const now = Date.now();
                const diff = Math.floor((now - startTimes[team - 1]) / 1000);
                elapsedSeconds[team - 1] = diff;
                document.getElementById(`time${team}`).textContent = formatTime(diff);
            }
        }, 1000);
    }

    function finishTeam(team) {
        // Зупиняємо таймер
        if (timers[team - 1]) {
            clearInterval(timers[team - 1]);
            timers[team - 1] = null;
        }
        // Фіксуємо час (якщо ще не зафіксовано)
        if (startTimes[team - 1]) {
            const now = Date.now();
            elapsedSeconds[team - 1] = Math.floor((now - startTimes[team - 1]) / 1000);
            startTimes[team - 1] = null;
        }

        // Ховаємо поточний раунд
        document.getElementById(`team${team}`).style.display = "none";

        // Перехід до наступної команди або фіналу
        if (team < 3) {
            document.getElementById(`team${team + 1}NameInput`).style.display = "block";
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        // Підготувати дані для рейтингу
        let results = [];
        for (let t = 0; t < 3; t++) {
            results.push({
                name: teamNames[t] || `Команда ${t + 1}`,
                score: scores[t],
                time: elapsedSeconds[t]
            });
        }

        // Сортування: більше очок, при рівності – менший час
        results.sort((a, b) => {
            if (a.score !== b.score) return b.score - a.score;
            else return a.time - b.time;
        });

        // Формуємо HTML для подіуму
        const medals = ['🥇', '🥈', '🥉'];
        const places = ['first', 'second', 'third'];
        let podiumHTML = '<h2>⚡ ФІНАЛЬНИЙ РЕЙТИНГ ⚡</h2><div class="podium">';

        for (let i = 0; i < 3; i++) {
            const r = results[i];
            podiumHTML += `
                <div class="place ${places[i]}">
                    <div class="medal">${medals[i]}</div>
                    <div class="team-name">${r.name}</div>
                    <div class="stats">✅ ${r.score} / 13<br>⏱️ ${formatTime(r.time)}</div>
                </div>
            `;
        }
        podiumHTML += '</div>';

        document.getElementById('overallFinal').innerHTML = podiumHTML;
        document.getElementById('overallFinal').style.display = 'block';
    }
</script>
